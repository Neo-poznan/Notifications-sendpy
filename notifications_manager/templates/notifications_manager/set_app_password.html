{% extends "notifications_manager/base.html" %}
{% load static %}

{% block css %}
<title>Notifications-sendpy</title>
<link rel="stylesheet" href="">
{% endblock %}

{% block content %}
<div id="container">
<main>
    <div class="errors">
        {% if errors %}{{ errors }}{% endif %}
    </div>
<form action="{% url 'notifications_manager:set_app_password' %}" method="post">
    {% csrf_token %}
    {% if app_password %}
    <input type="text" name="app_password" placeholder="Пароль приложения" value="{{ app_password }}">
    {% else %}
    <input type="text" name="app_password" placeholder="Пароль приложения">
    {% endif %}
    <br>
    <button class="button" type="submit">Сохранить</button>
    <a href="{% url 'notifications_manager:set_message' %}">Далее</a>
</form>
</main>
</div>
{% endblock %}
